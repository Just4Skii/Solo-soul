<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#2E5E4E"/>
  <!-- Lotus / soul petals -->
  <!-- Centre circle -->
  <circle cx="32" cy="32" r="5" fill="#F5EFE6"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="5" fill="#F5EFE6"/>
  <!-- 6 outer petals - leaf / teardrop shapes -->
  <!-- Top petal -->
  <ellipse cx="32" cy="20" rx="4" ry="8" fill="#A8B8A5" transform="rotate(0 32 32)"/>
  <!-- Top-right petal -->
  <ellipse cx="32" cy="20" rx="4" ry="8" fill="#A8B8A5" transform="rotate(60 32 32)"/>
  <!-- Bottom-right petal -->
  <ellipse cx="32" cy="20" rx="4" ry="8" fill="#A8B8A5" transform="rotate(120 32 32)"/>
  <!-- Bottom petal -->
  <ellipse cx="32" cy="20" rx="4" ry="8" fill="#F5EFE6" opacity="0.75" transform="rotate(180 32 32)"/>
  <!-- Bottom-left petal -->
  <ellipse cx="32" cy="20" rx="4" ry="8" fill="#F5EFE6" opacity="0.75" transform="rotate(240 32 32)"/>
  <!-- Top-left petal -->
  <ellipse cx="32" cy="20" rx="4" ry="8" fill="#F5EFE6" opacity="0.75" transform="rotate(300 32 32)"/>
  <!-- Centre dot -->
  <circle cx="32" cy="32" r="4.5" fill="#2E5E4E"/>
  <circle cx="32" cy="32" r="2.5" fill="#F5EFE6"/>
</svg>
